<div class="admin-container">
    <header class="header">
        <div class="header-content">
            <h1>Gestión de Reservas</h1>
            <p class="subtitle">Administra los ingresos y ocupación de todos los hoteles</p>
        </div>
        <div class="header-actions">
            <button class="btn-secondary" (click)="exportData()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Exportar
            </button>
        </div>
    </header>

    <app-admin-reservations-filters [hotels]="hotels()" [statusOptions]="statusOptions"
        [loadingHotels]="loadingHotels()" [hasMoreHotels]="hasMoreHotels()" (hotelSearch)="handleHotelSearch($event)"
        (hotelLoadMore)="handleHotelLoadMore()" (filtersChanged)="handleFiltersChange($event)">
    </app-admin-reservations-filters>

    @if (isLoading()) {
    <div class="loading-container">
        <div class="spinner"></div>
        <p>Actualizando lista de reservas...</p>
    </div>
    } @else {
    <app-admin-reservations-table [reservations]="reservations()" [currentPage]="currentPage()"
        [totalPages]="totalPages()" [totalElements]="totalElements()" [isLoading]="isLoading()"
        (pageChange)="handlePageChange($event)">
    </app-admin-reservations-table>
    }
</div>
