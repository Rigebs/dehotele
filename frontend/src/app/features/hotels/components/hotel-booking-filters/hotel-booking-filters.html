<form [formGroup]="reservationForm" class="date-picker-bar">
    <div class="input-wrapper">
        <app-date-picker label="Check-in" placeholder="¿Cuándo llegas?" formControlName="checkInDate" [minDate]="today">
        </app-date-picker>
    </div>

    <div class="divider"></div>

    <div class="input-wrapper">
        <app-date-picker label="Check-out" placeholder="¿Cuándo te vas?" formControlName="checkOutDate"
            [minDate]="minCheckOut()">
        </app-date-picker>
    </div>

    <div class="search-button-container">
        <button type="button" (click)="onSearch()" [disabled]="reservationForm.invalid" class="btn-search-availability">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                style="margin-right: 8px;">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
            </svg>
            Buscar disponibilidad
        </button>
    </div>
</form>
