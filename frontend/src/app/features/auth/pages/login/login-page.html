<section class="auth-container">
    <div class="auth-card">
        <h2>Login</h2>

        <form [formGroup]="form" (ngSubmit)="submit()">

            <app-input [label]="'Email'" [type]="'email'" formControlName="email" [error]="
                    form.get('email')?.touched && form.get('email')?.hasError('required') ? 'Email is required' :
                    form.get('email')?.touched && form.get('email')?.hasError('email') ? 'Enter a valid email' :
                    null">
            </app-input>

            <app-input [label]="'Password'" [type]="'password'" formControlName="password"
                [error]="form.get('password')?.touched && form.get('password')?.invalid ? 'Password is required' : null">
            </app-input>

            <app-button type="submit" [loading]="isLoading()">
                @if(isLoading()) { Loading... } @else { Login }
            </app-button>

            @if(errorMessage()) {
            <p class="error">{{ errorMessage() }}</p>
            }

        </form>
    </div>
</section>
