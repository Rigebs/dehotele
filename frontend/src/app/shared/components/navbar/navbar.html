<nav class="navbar">
    <div class="navbar-container">
        <a routerLink="/" class="logo">
            <span class="logo-icon">H</span>
            <span class="logo-text">BookingApp</span>
        </a>

        <div class="nav-links">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
                Hotels
            </a>

            @if (isAuthenticated()) {
            <a routerLink="/reservations" routerLinkActive="active" class="nav-item">
                My Reservations
            </a>
            }
        </div>

        <div class="auth-group">
            @if (!isAuthenticated()) {
            <a routerLink="/auth/login" class="login-link">Login</a>
            <a routerLink="/auth/register" class="register-btn">Register</a>
            } @else {

            @if (isAdmin()) {
            <a routerLink="/admin" class="admin-chip">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <line x1="9" y1="3" x2="9" y2="21" />
                    <line x1="3" y1="9" x2="21" y2="9" />
                </svg>
                Admin Panel
            </a>
            }

            <div class="user-profile">
                <div class="avatar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
                <span class="user-name">My Account</span>
            </div>

            <button (click)="logout()" class="logout-icon-btn" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </button>
            }
        </div>
    </div>
</nav>
