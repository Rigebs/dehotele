<nav class="navbar">
    <div class="navbar-container">
        <a routerLink="/" class="logo logo-elegant">
            <span class="logo-icon-container">
                <span class="logo-icon-bg">
                    <span class="logo-icon-text">D</span>
                </span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="logo-icon-svg">
                    <path fill-rule="evenodd"
                        d="M3 2.25a.75.75 0 000 1.5v16.5h-.75a.75.75 0 000 1.5H15v-1.5h-1.5V3.75h1.5v-1.5H3zM4.5 3.75h7.5V20.25H4.5V3.75zm12.75 3a.75.75 0 000 1.5h3a.75.75 0 000-1.5h-3zm0 3a.75.75 0 000 1.5h3a.75.75 0 000-1.5h-3zm0 3a.75.75 0 000 1.5h3a.75.75 0 000-1.5h-3z"
                        clip-rule="evenodd" />
                </svg>
            </span>
            <span class="logo-text">Dehotele</span>
        </a>

        <div class="nav-links">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
                Hotels
            </a>

            @if (isAuthenticated()) {
            <a routerLink="/reservations/my" routerLinkActive="active" class="nav-item">
                My Reservations
            </a>
            }
        </div>

        <div class="auth-group">
            @if (!isAuthenticated()) {
            <a routerLink="/auth/login" class="login-link">Login</a>
            <a routerLink="/auth/register" class="register-btn">Register</a>
            } @else {

            @if (isAdmin()) {
            <a routerLink="/admin" class="admin-chip">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <line x1="9" y1="3" x2="9" y2="21" />
                    <line x1="3" y1="9" x2="21" y2="9" />
                </svg>
                Admin Panel
            </a>
            }

            <a routerLink="/profile" class="user-profile-link">
                <div class="user-profile">
                    <div class="avatar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <span class="user-name">{{ user()?.fullName || 'Account' }}</span>
                </div>
            </a>

            <button (click)="logout()" class="logout-icon-btn" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </button>
            }
        </div>
    </div>
</nav>
