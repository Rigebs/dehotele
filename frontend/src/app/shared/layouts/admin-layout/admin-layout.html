<div class="admin-layout" [class.sidebar-open]="sidebarOpen">

    <!-- Sidebar como componente -->
    <app-admin-sidebar [sidebarOpen]="sidebarOpen" (closeSidebarEvent)="closeSidebar()"></app-admin-sidebar>

    <!-- Overlay móvil -->
    <div *ngIf="sidebarOpen" class="overlay" (click)="closeSidebar()"></div>

    <!-- Main -->
    <div class="main">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-btn" (click)="toggleSidebar()">☰</button>
                <span class="title">Panel de Administración</span>
            </div>
            <div class="topbar-right">
                <span class="admin-user">Administrador</span>
            </div>
        </header>

        <section class="content">
            <router-outlet></router-outlet>
        </section>
    </div>
</div>
